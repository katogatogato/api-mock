openapi: "3.0.3"
info:
  title: Petstore API
  version: "1.0.0"
  description: A sample API that uses a petstore as an example
servers:
  - url: http://localhost:3456
    description: Mock server
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      tags: [pets]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 100
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
    post:
      operationId: createPet
      summary: Create a pet
      tags: [pets]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPet"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
  /pets/{petId}:
    get:
      operationId: getPetById
      summary: Get a pet by ID
      tags: [pets]
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deletePet
      summary: Delete a pet
      tags: [pets]
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /users:
    get:
      operationId: listUsers
      summary: List all users
      tags: [users]
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      summary: Create a user
      tags: [users]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewUser"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /users/{userId}:
    get:
      operationId: getUserById
      summary: Get a user by ID
      tags: [users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /orders:
    get:
      operationId: listOrders
      summary: List all orders
      tags: [orders]
      responses:
        "200":
          description: A list of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      summary: Place a new order
      tags: [orders]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewOrder"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
components:
  schemas:
    Pet:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        species:
          type: string
          enum: [dog, cat, bird, fish, hamster, rabbit]
        breed:
          type: string
        age:
          type: integer
          minimum: 0
          maximum: 30
        price:
          type: number
        available:
          type: boolean
        photoUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
    NewPet:
      type: object
      properties:
        name:
          type: string
        species:
          type: string
        breed:
          type: string
        age:
          type: integer
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        avatarUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
    NewUser:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
    Order:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        petId:
          type: integer
        totalPrice:
          type: number
        status:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled]
        orderDate:
          type: string
          format: date-time
    NewOrder:
      type: object
      properties:
        userId:
          type: integer
        petId:
          type: integer
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
